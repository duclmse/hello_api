# OpenCollection v1 — portable HTTP test collection format
# Run with: hello_client sample.yml
# Convert to .http: hello_client sample.yml --to http -o out.http
# Convert to Postman: hello_client sample.yml --to postman -o out.json

name: Sample Collection
version: "1"
env:
  base_url: https://httpbin.org
  token: my-secret-token
  user_id: "42"

requests:
  - name: users/get anything
    method: GET
    url: "{{base_url}}/anything"
    headers:
      Accept: application/json

  - name: users/get with auth
    method: GET
    url: "{{base_url}}/bearer"
    headers:
      Authorization: "Bearer {{token}}"
    script:
      post: |
        pm.test("status is 200", function () {
          expect(pm.response.code).to.equal(200);
        });

  - name: users/post json body
    method: POST
    url: "{{base_url}}/post"
    headers:
      Content-Type: application/json
      Accept: application/json
    body: |
      {"id": "{{user_id}}", "name": "Alice", "email": "alice@example.com"}
    script:
      post: |
        pm.test("status is 200", function () {
          expect(pm.response.code).to.equal(200);
        });
        pm.test("echoes request body", function () {
          var body = pm.response.json();
          expect(body.json.name).to.equal("Alice");
        });

  - name: users/put update
    method: PUT
    url: "{{base_url}}/put"
    headers:
      Content-Type: application/json
      Authorization: "Bearer {{token}}"
    body: |
      {"id": "{{user_id}}", "name": "Alice Updated"}

  - name: users/delete
    method: DELETE
    url: "{{base_url}}/delete"
    headers:
      Authorization: "Bearer {{token}}"

  - name: headers/echo
    method: GET
    url: "{{base_url}}/headers"
    headers:
      X-Custom-Header: hello
      X-Request-Id: req-001
