info:
  name: 07_upload_multipart_file
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/post"
  headers:
    - name: X-Custom-Header
      value: Hello, you there!
  body:
    type: form-urlencoded
    data:
      - name: name
        value: value
      - name: user
        value: user123
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: token
      value: my-secret-token
  scripts:
    - type: after-response
      code: |-
        test("request successfully", () => {
          expect(res.status).to.equal(200)
        })

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
