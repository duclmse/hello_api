info:
  name: 03_post_anything
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/anything"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: token
      value: my-secret-token
  scripts:
    - type: after-response
      code: |-
        test("request successfully", () => {
          expect(res.status).to.equal(200)
        })

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
